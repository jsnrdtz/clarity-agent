name: Refresh production snapshots

on:
  schedule:
    - cron: "17 */6 * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-snapshot-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh agent snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CLARITY_API_URL: https://clarity-agent-production.up.railway.app

    steps:
      - name: Refresh production snapshots
        shell: bash
        env:
          CLARITY_REFRESH_TOKEN: ${{ secrets.CLARITY_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CLARITY_REFRESH_TOKEN:-}" ]; then
            echo "CLARITY_REFRESH_TOKEN is not configured."
            exit 1
          fi

          RESPONSE_FILE="/tmp/clarity-refresh-report.json"

          STATUS="$(
            curl \
              --silent \
              --show-error \
              --max-time 300 \
              --output "${RESPONSE_FILE}" \
              --write-out '%{http_code}' \
              --request POST \
              --header \
                "Authorization: Bearer ${CLARITY_REFRESH_TOKEN}" \
              "${CLARITY_API_URL}/api/v1/admin/refresh"
          )"

          echo "Refresh endpoint returned HTTP ${STATUS}."

          if [ "${STATUS}" != "200" ]; then
            cat "${RESPONSE_FILE}"
            echo
            exit 1
          fi

          node <<'NODE'
          const fs =
            require("node:fs");

          const report =
            JSON.parse(
              fs.readFileSync(
                "/tmp/clarity-refresh-report.json",
                "utf8"
              )
            );

          const results =
            Array.isArray(
              report.results
            )
              ? report.results
              : [];

          console.log(
            JSON.stringify(
              {
                schemaVersion:
                  report.schemaVersion,

                startedAt:
                  report.startedAt,

                completedAt:
                  report.completedAt,

                durationMs:
                  report.durationMs,

                totals:
                  report.totals,

                results:
                  results.map(
                    (result) => ({
                      slug:
                        result.agent?.slug,

                      status:
                        result.status,

                      snapshotSavedAt:
                        result.snapshotSavedAt ??
                        null,

                      error:
                        result.error ??
                        null
                    })
                  )
              },
              null,
              2
            )
          );

          const registered =
            report.totals?.registered;

          const refreshed =
            report.totals?.refreshed;

          const failed =
            report.totals?.failed;

          if (
            report.schemaVersion !== "1.0"
          ) {
            throw new Error(
              "Unexpected refresh report schema version."
            );
          }

          if (
            !Number.isInteger(
              registered
            ) ||
            registered <= 0
          ) {
            throw new Error(
              "Invalid registered-agent count."
            );
          }

          if (
            refreshed !== registered
          ) {
            throw new Error(
              `Expected ${registered} refreshed agents, received ${refreshed}.`
            );
          }

          if (failed !== 0) {
            throw new Error(
              `Refresh contains ${failed} failed agents.`
            );
          }

          if (
            results.length !==
            registered
          ) {
            throw new Error(
              "Refresh result count does not match the registry."
            );
          }

          for (
            const result
            of results
          ) {
            if (
              result.status !==
              "refreshed"
            ) {
              throw new Error(
                `${result.agent?.slug ?? "unknown"}: refresh failed.`
              );
            }

            if (
              typeof result
                .snapshotSavedAt !==
                "string" ||
              result
                .snapshotSavedAt
                .length === 0
            ) {
              throw new Error(
                `${result.agent?.slug ?? "unknown"}: snapshot timestamp is missing.`
              );
            }
          }
          NODE

      - name: Verify production ranking
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --show-error \
            --silent \
            --max-time 180 \
            "${CLARITY_API_URL}/api/v1/ranking" \
            > /tmp/clarity-ranking.json

          node <<'NODE'
          const fs =
            require("node:fs");

          const refreshReport =
            JSON.parse(
              fs.readFileSync(
                "/tmp/clarity-refresh-report.json",
                "utf8"
              )
            );

          const ranking =
            JSON.parse(
              fs.readFileSync(
                "/tmp/clarity-ranking.json",
                "utf8"
              )
            );

          const ranked =
            Array.isArray(
              ranking.ranked
            )
              ? ranking.ranked
              : [];

          const unranked =
            Array.isArray(
              ranking.unranked
            )
              ? ranking.unranked
              : [];

          console.log(
            JSON.stringify(
              {
                totals:
                  ranking.totals,

                ranked:
                  ranked.map(
                    (entry) => ({
                      rank:
                        entry.rank,

                      slug:
                        entry.agent?.slug,

                      githubScore:
                        entry.githubScore,

                      sourceCollectedAt:
                        entry.sourceCollectedAt,

                      evaluationCollectedAt:
                        entry.evaluationCollectedAt
                    })
                  ),

                unranked:
                  unranked.map(
                    (entry) => ({
                      slug:
                        entry.agent?.slug,

                      githubScore:
                        entry.githubScore,

                      confidence:
                        entry.confidence,

                      reason:
                        entry.reason,

                      sourceCollectedAt:
                        entry.sourceCollectedAt,

                      evaluationCollectedAt:
                        entry.evaluationCollectedAt
                    })
                  ),

                generatedAt:
                  ranking.generatedAt
              },
              null,
              2
            )
          );

          const registered =
            ranking.totals?.registered;

          if (
            registered !==
            refreshReport
              .totals
              ?.registered
          ) {
            throw new Error(
              "Ranking registry count does not match the refresh report."
            );
          }

          if (
            ranking.totals?.ranked +
              ranking.totals?.unranked !==
            registered
          ) {
            throw new Error(
              "Ranking totals do not match the registry."
            );
          }

          if (
            ranked.length +
              unranked.length !==
            registered
          ) {
            throw new Error(
              "Ranking entry count does not match the registry."
            );
          }

          for (
            const entry
            of [
              ...ranked,
              ...unranked
            ]
          ) {
            if (
              typeof entry
                .sourceCollectedAt !==
                "string" ||
              typeof entry
                .evaluationCollectedAt !==
                "string"
            ) {
              throw new Error(
                `${entry.agent?.slug ?? "unknown"}: freshness metadata is missing.`
              );
            }
          }
          NODE
